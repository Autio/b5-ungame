<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lost in Hyperspace - The Babylon Project</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Exo+2:wght@400&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Exo 2', sans-serif;
            background: #0E0B16;
            color: #E7DFDD;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2rem;
        }
        .container { max-width: 500px; }
        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 6rem;
            color: #A239CA;
            text-shadow: 0 0 30px rgba(162, 57, 202, 0.5);
            margin-bottom: 1rem;
        }
        h2 {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.5rem;
            color: #4717F6;
            margin-bottom: 1.5rem;
        }
        p {
            color: #9A959E;
            margin-bottom: 2rem;
            line-height: 1.6;
        }
        a {
            display: inline-block;
            padding: 0.75rem 2rem;
            background: linear-gradient(135deg, #4717F6, #A239CA);
            color: white;
            text-decoration: none;
            border-radius: 4px;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            transition: transform 0.3s, box-shadow 0.3s;
        }
        a:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 30px rgba(162, 57, 202, 0.5);
        }
        .quote {
            margin-top: 3rem;
            font-style: italic;
            color: #6A656E;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>404</h1>
        <h2>Lost in Hyperspace</h2>
        <p>The jump gate you were looking for has collapsed. Perhaps it never existed, or perhaps it exists in a different timeline altogether.</p>
        <a href="/">Return to Station</a>
        <p class="quote">"If you go to Z'ha'dum, you will die."<br>— Kosh Naranek</p>
    </div>
</body>
</html>
